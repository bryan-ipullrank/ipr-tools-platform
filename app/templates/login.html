{% extends "base.html" %}
{% block title %}Sign in · iPullRank IDP{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm bg-white border border-slate-200 rounded-xl shadow-sm p-8 text-center">
    <h1 class="text-xl font-semibold text-slate-900">Developer Portal</h1>
    <p class="mt-2 text-sm text-slate-500">
      Sign in with your iPullRank Google account to access internal tools.
    </p>
    <a href="{{ url_for('google.login') }}"
       class="mt-6 inline-flex items-center justify-center gap-2 w-full rounded-md
              bg-slate-900 px-4 py-2.5 text-sm font-medium text-white hover:bg-slate-700">
      Sign in with Google
    </a>
  </div>
</div>
{% endblock %}
